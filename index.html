<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prévisualisation réveil ESP32-S3 LVGL</title>
  <style>
    :root {
      --screen-width: 480px;
      --screen-height: 320px;
      --screen-bg: #05060d;
      --line: #1c2338;
      --foreground: #edf2ff;
      --muted: #8ea1ce;
      --blue: #3e9cff;
      --blue-soft: #6fa7ff;
      --card: #0c0d22;
      --card-border: #20284b;
      --sky-top: #071126;
      --sky-middle: #080923;
      --sky-bottom: #02040d;
      --panel: rgb(9 20 48 / 68%);
      --panel-border: rgb(70 117 205 / 28%);
      --accent-gold: #ffb000;
      --hill-front: #02040b;
      --hill-back: #050b19;
      --sun: #ffb21a;
      --sun-glow: rgb(255 178 26 / 42%);
    }

    * { box-sizing: border-box; }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
      background: #242424;
      font-family: Montserrat, Arial, Helvetica, sans-serif;
    }

    .screen {
      position: relative;
      width: var(--screen-width);
      height: var(--screen-height);
      overflow: hidden;
      color: var(--foreground);
      background: var(--screen-bg);
      border: 2px solid #1d2434;
      border-radius: 10px;
      box-shadow: 0 12px 32px rgb(0 0 0 / 20%);
    }

    .sky-background,
    .content-layer,
    .app-page {
      position: absolute;
      inset: 0;
    }

    .sky-background {
      z-index: 0;
      background:
        radial-gradient(circle at 23% 46%, var(--sun-glow) 0 8%, transparent 16%),
        linear-gradient(180deg, var(--sky-top) 0%, var(--sky-middle) 58%, var(--sky-bottom) 100%);
    }

    .sky-background::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, #dbe8ff 0 1px, transparent 1.6px),
        radial-gradient(circle, #85a4df 0 1px, transparent 1.5px),
        radial-gradient(circle, #ffffff 0 1px, transparent 1.4px);
      background-position: 8px 27px, 36px 14px, 90px 7px;
      background-size: 48px 63px, 67px 82px, 112px 96px;
      opacity: 0.85;
    }

    .sky-background::after {
      content: "";
      position: absolute;
      inset: auto -20px 0 -20px;
      height: 104px;
      background:
        radial-gradient(85px 24px at 20% 70%, var(--hill-back) 0 99%, transparent 100%),
        radial-gradient(118px 28px at 61% 62%, var(--hill-back) 0 99%, transparent 100%),
        radial-gradient(140px 32px at 86% 72%, var(--hill-back) 0 99%, transparent 100%),
        linear-gradient(180deg, transparent 0 42%, var(--hill-front) 43% 100%);
    }

    .sun {
      position: absolute;
      left: 80px;
      top: 118px;
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, #ffd979 0 14%, var(--sun) 48%, #d67d00 100%);
      box-shadow: 0 0 22px var(--sun-glow);
    }

    .moon-dots {
      position: absolute;
      right: -8px;
      top: 72px;
      display: flex;
      gap: 4px;
      opacity: 0.28;
    }

    .moon-dots span {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #b7c7ff;
    }

    .content-layer { z-index: 1; }
    .app-page { z-index: 2; background: var(--screen-bg); }
    .hidden { display: none; }

    .eyebrow,
    .page-title,
    .page-count {
      position: absolute;
      color: var(--muted);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .page-title { left: 18px; top: 16px; }
    .page-count { right: 18px; top: 16px; color: #294c9d; letter-spacing: 1px; text-transform: none; }
    .page-line { position: absolute; left: 0; right: 0; top: 39px; height: 1px; background: var(--line); }
    .page-footer-line { position: absolute; left: 0; right: 0; bottom: 42px; height: 1px; background: var(--line); }

    .clock-title { left: 22px; top: 15px; }
    .alarm-title { right: 26px; top: 15px; }

    .clock-label {
      position: absolute;
      left: 18px;
      top: 44px;
      font-size: 80px;
      font-weight: 800;
      line-height: 0.82;
      letter-spacing: 2px;
      text-shadow: 0 2px 12px rgb(70 122 255 / 18%);
    }

    .date-label {
      position: absolute;
      left: 23px;
      top: 125px;
      color: #a9b9eb;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .alarm-card {
      position: absolute;
      right: 18px;
      top: 34px;
      width: 150px;
      height: 78px;
      padding: 10px 12px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      box-shadow: inset 0 0 20px rgb(35 79 160 / 14%);
    }

    .alarm-time {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 1px;
    }

    .alarm-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--blue);
      box-shadow: 0 0 10px var(--blue);
    }

    .alarm-days,
    .row-days {
      color: var(--blue-soft);
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .alarm-days {
      display: inline-block;
      margin-top: 11px;
      padding: 2px 8px;
      background: rgb(28 57 111 / 48%);
      border-radius: 4px;
    }

    button {
      font: inherit;
      cursor: pointer;
      user-select: none;
    }

    .action-button,
    .nav-button,
    .small-button,
    .day-button {
      position: absolute;
      height: 30px;
      border-radius: 7px;
      background: #05060d;
      color: #fff;
      border: 1px solid #444b64;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .action-button { bottom: 8px; padding: 0 26px; }
    .menu-button { left: 145px; color: #a9d6ff; border-color: rgb(45 135 205 / 75%); background: rgb(10 33 59 / 86%); }
    .alarm-button { left: 242px; color: #ffe8a6; border-color: rgb(255 176 0 / 80%); background: rgb(43 29 5 / 86%); }

    .alarm-row {
      position: absolute;
      left: 18px;
      width: 448px;
      height: 63px;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      background: var(--card);
    }

    .alarm-row:nth-of-type(1) { top: 46px; }
    .row-time {
      position: absolute;
      left: 12px;
      top: 8px;
      padding: 0;
      background: transparent;
      border: 0;
      color: inherit;
      font-size: 25px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 2px;
    }

    .row-days { position: absolute; left: 13px; top: 40px; }
    .toggle { position: absolute; right: 72px; top: 21px; width: 36px; height: 20px; border: 1px solid #464b63; border-radius: 999px; background: #111321; }
    .toggle::after { content: ""; position: absolute; top: 3px; width: 14px; height: 14px; border-radius: 50%; background: var(--blue); box-shadow: 0 0 8px var(--blue); transition: left 120ms ease; }
    .toggle.on::after { left: 18px; }
    .toggle:not(.on)::after { left: 3px; background: #555b70; box-shadow: none; }
    .delete-button { position: absolute; right: 12px; top: 13px; width: 50px; height: 38px; border: 1px solid #42465f; border-radius: 8px; background: #101120; color: #fff; font-size: 17px; font-weight: 900; }

    .nav-button.left { left: 18px; bottom: 8px; width: 106px; }
    .nav-button.right { right: 14px; bottom: 8px; width: 116px; }
    .nav-button.cancel { left: 22px; bottom: 6px; width: 116px; }
    .nav-button.save { right: 14px; bottom: 6px; width: 150px; }

    .picker { position: absolute; inset: 72px 0 auto; height: 132px; display: flex; justify-content: center; gap: 28px; align-items: center; }
    .time-column { position: relative; width: 82px; height: 132px; }
    .time-value { position: absolute; left: 0; right: 0; top: 43px; text-align: center; font-size: 54px; font-weight: 900; line-height: 1; letter-spacing: 2px; color: #dde8ff; }
    .colon { align-self: center; color: #33549a; font-size: 54px; font-weight: 900; margin-top: -2px; }
    .small-button { left: 20px; width: 42px; padding: 0; }
    .small-button.up { top: 4px; }
    .small-button.down { bottom: 0; }
    .days-picker { position: absolute; left: 105px; top: 216px; display: flex; gap: 6px; }
    .day-button { position: static; width: 35px; height: 26px; padding: 0; }
    .day-button.checked { border-color: var(--blue-soft); background: #172a54; }

    .music-toolbar { position: absolute; left: 18px; right: 18px; top: 50px; display: flex; align-items: center; justify-content: space-between; }
    .music-help { max-width: 260px; color: var(--muted); font-size: 9px; line-height: 1.4; letter-spacing: 0.5px; }
    .folder-button { position: static; width: 154px; color: #a9d6ff; border-color: rgb(45 135 205 / 75%); background: rgb(10 33 59 / 86%); }
    .music-list { position: absolute; left: 18px; right: 18px; top: 96px; bottom: 50px; display: grid; gap: 7px; overflow: auto; }
    .music-empty { display: grid; place-items: center; height: 100%; border: 1px dashed var(--card-border); border-radius: 8px; color: var(--muted); font-size: 10px; text-align: center; line-height: 1.6; }
    .music-row { min-height: 48px; display: grid; grid-template-columns: minmax(0, 1fr) auto auto; align-items: center; gap: 8px; padding: 7px 9px 7px 12px; border: 1px solid var(--card-border); border-radius: 8px; background: var(--card); }
    .music-row.selected { border-color: var(--blue-soft); background: #101938; }
    .music-name { overflow: hidden; color: var(--foreground); font-size: 11px; font-weight: 800; text-overflow: ellipsis; white-space: nowrap; }
    .music-status { margin-top: 4px; color: var(--blue-soft); font-size: 8px; font-weight: 700; letter-spacing: 1px; }
    .music-action { height: 30px; border: 1px solid #42465f; border-radius: 7px; background: #101120; color: #fff; font-size: 9px; font-weight: 800; }
    .music-action.choose { color: #ffe8a6; border-color: rgb(255 176 0 / 55%); }
    .music-action.playing { color: #a9d6ff; border-color: var(--blue); }
  </style>
</head>
<body>
  <main class="screen" aria-label="Prévisualisation 480 par 320 de l'interface réveil">
    <div class="sky-background" aria-hidden="true">
      <div class="sun"></div>
      <div class="moon-dots" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span><span></span></div>
    </div>

    <section id="homePage" class="content-layer" aria-label="Informations du réveil">
      <div class="eyebrow clock-title">HEURE</div>
      <div id="clockLabel" class="clock-label">--:--</div>
      <div id="dateLabel" class="date-label">--</div>

      <div class="eyebrow alarm-title">RÉVEIL</div>
      <aside class="alarm-card" aria-label="Réveil programmé">
        <div class="alarm-time"><span class="alarm-dot"></span><span id="alarmTimeLabel">07:00</span></div>
        <div id="alarmDaysLabel" class="alarm-days">LUN - VEN</div>
      </aside>

      <button id="menuButton" class="action-button menu-button" type="button">MENU</button>
      <button id="alarmButton" class="action-button alarm-button" type="button">RÉVEIL</button>
    </section>

    <section id="listPage" class="app-page hidden" aria-label="Liste des réveils"></section>
    <section id="editPage" class="app-page hidden" aria-label="Nouveau réveil"></section>
    <section id="menuPage" class="app-page hidden" aria-label="Choix de la sonnerie"></section>
    <input id="musicFolderInput" class="hidden" type="file" accept="audio/*,.mp3,.wav,.ogg,.m4a,.aac,.flac" multiple webkitdirectory>
  </main>

  <script>
    const clockLabel = document.getElementById('clockLabel');
    const dateLabel = document.getElementById('dateLabel');
    const alarmButton = document.getElementById('alarmButton');
    const alarmTimeLabel = document.getElementById('alarmTimeLabel');
    const alarmDaysLabel = document.getElementById('alarmDaysLabel');
    const homePage = document.getElementById('homePage');
    const listPage = document.getElementById('listPage');
    const editPage = document.getElementById('editPage');
    const menuPage = document.getElementById('menuPage');
    const musicFolderInput = document.getElementById('musicFolderInput');
    const weekdays = ['DIMANCHE', 'LUNDI', 'MARDI', 'MERCREDI', 'JEUDI', 'VENDREDI', 'SAMEDI'];
    const months = ['JANVIER', 'FÉVRIER', 'MARS', 'AVRIL', 'MAI', 'JUIN', 'JUILLET', 'AOÛT', 'SEPTEMBRE', 'OCTOBRE', 'NOVEMBRE', 'DÉCEMBRE'];
    const shortDays = ['DIM', 'LUN', 'MAR', 'MER', 'JEU', 'VEN', 'SAM'];
    let alarms = [
      { hour: 7, minute: 0, enabled: true, days: [false, true, true, true, true, true, false] },
      { hour: 9, minute: 0, enabled: true, days: [false, true, true, true, true, true, false] }
    ];
    let draftAlarm = null;
    let editingAlarmIndex = null;
    let selectedRingtone = localStorage.getItem('selectedRingtone') || '';
    let musicTracks = [];
    let playingAudio = null;
    let playingTrackName = '';

    function twoDigits(value) { return String(value).padStart(2, '0'); }
    function formatTime(alarm) { return `${twoDigits(alarm.hour)}:${twoDigits(alarm.minute)}`; }
    function formatDays(alarm) {
      const week = alarm.days.slice(1, 6).every(Boolean) && !alarm.days[0] && !alarm.days[6];
      const weekend = alarm.days[0] && alarm.days[6] && alarm.days.slice(1, 6).every(day => !day);
      if (week) return 'LUN - VEN';
      if (weekend) return 'WEEK-END';
      const selected = alarm.days.map((enabled, index) => enabled ? shortDays[index] : null).filter(Boolean);
      return selected.length ? selected.join(' ') : 'AUCUN JOUR';
    }

    function setPage(page) {
      homePage.classList.toggle('hidden', page !== 'home');
      listPage.classList.toggle('hidden', page !== 'list');
      editPage.classList.toggle('hidden', page !== 'edit');
      menuPage.classList.toggle('hidden', page !== 'menu');
      if (page !== 'menu') stopPreview();
    }

    function findNextActiveAlarm(now = new Date()) {
      const today = now.getDay();
      const currentMinutes = now.getHours() * 60 + now.getMinutes();
      let nextAlarm = null;
      let nextDelay = Number.POSITIVE_INFINITY;

      alarms.forEach(alarm => {
        if (!alarm.enabled) return;

        const alarmMinutes = alarm.hour * 60 + alarm.minute;
        for (let dayOffset = 0; dayOffset < shortDays.length; dayOffset += 1) {
          const checkedDay = (today + dayOffset) % shortDays.length;
          if (!alarm.days[checkedDay]) continue;
          if (dayOffset === 0 && alarmMinutes < currentMinutes) continue;

          const delay = dayOffset * 24 * 60 + alarmMinutes - (dayOffset === 0 ? currentMinutes : 0);
          if (delay < nextDelay) {
            nextDelay = delay;
            nextAlarm = alarm;
          }
          break;
        }
      });

      return nextAlarm;
    }

    function updateClockDisplay() {
      const now = new Date();
      clockLabel.textContent = `${twoDigits(now.getHours())}:${twoDigits(now.getMinutes())}`;
      dateLabel.textContent = `${weekdays[now.getDay()]} ${twoDigits(now.getDate())} ${months[now.getMonth()]}`;
      const nextAlarm = findNextActiveAlarm(now);
      alarmTimeLabel.textContent = nextAlarm ? formatTime(nextAlarm) : '--:--';
      alarmDaysLabel.textContent = nextAlarm ? formatDays(nextAlarm) : 'AUCUN';
    }

    const supportedMusicPattern = /\.(mp3|wav|ogg|m4a|aac|flac)$/i;

    function trackNameFromPath(path) {
      return decodeURIComponent(path.split('/').pop()).replace(/\.[^.]+$/, '');
    }

    function musicUrlFromPath(path) {
      return `musiques/${path.split('/').map(encodeURIComponent).join('/')}`;
    }

    function musicTrack(path, url = musicUrlFromPath(path)) {
      return { name: path, label: trackNameFromPath(path), url };
    }

    function stopPreview() {
      if (playingAudio) {
        playingAudio.pause();
        playingAudio.currentTime = 0;
      }
      playingAudio = null;
      playingTrackName = '';
    }

    function renderMusicMenu() {
      menuPage.innerHTML = `
        <div class="page-title">CHOIX SONNERIE RÉVEIL</div>
        <div class="page-count">${musicTracks.length} musique${musicTracks.length > 1 ? 's' : ''}</div>
        <div class="page-line"></div>
        <div class="music-toolbar">
          <div class="music-help">Les fichiers audio du dossier musiques sont chargés automatiquement.</div>
          <button class="nav-button folder-button" data-action="folder" type="button">+ OUVRIR DOSSIER</button>
        </div>
        <div class="music-list">
          ${musicTracks.length ? musicTracks.map(track => `
            <article class="music-row ${selectedRingtone === track.name ? 'selected' : ''}">
              <div><div class="music-name">${track.label}</div><div class="music-status">${selectedRingtone === track.name ? 'SONNERIE SÉLECTIONNÉE' : 'DISPONIBLE'}</div></div>
              <button class="music-action ${playingTrackName === track.name ? 'playing' : ''}" data-action="preview" data-track="${track.name}" type="button">${playingTrackName === track.name ? '■ STOP' : '▶ ÉCOUTER'}</button>
              <button class="music-action choose" data-action="choose" data-track="${track.name}" type="button">CHOISIR</button>
            </article>`).join('') : '<div class="music-empty">Aucune musique trouvée.<br>Ajoutez des fichiers audio dans le dossier musiques<br>ou ouvrez un dossier depuis cet écran.</div>'}
        </div>
        <div class="page-footer-line"></div>
        <button class="nav-button left" data-action="home" type="button">← RETOUR</button>
      `;

      menuPage.querySelector('[data-action="home"]').addEventListener('click', () => setPage('home'));
      menuPage.querySelector('[data-action="folder"]').addEventListener('click', () => musicFolderInput.click());
      menuPage.querySelectorAll('[data-action="choose"]').forEach(button => button.addEventListener('click', () => {
        selectedRingtone = button.dataset.track;
        localStorage.setItem('selectedRingtone', selectedRingtone);
        renderMusicMenu();
      }));
      menuPage.querySelectorAll('[data-action="preview"]').forEach(button => button.addEventListener('click', async () => {
        const track = musicTracks.find(item => item.name === button.dataset.track);
        if (!track) return;
        if (playingTrackName === track.name) {
          stopPreview();
          renderMusicMenu();
          return;
        }
        stopPreview();
        playingAudio = new Audio(track.url);
        playingTrackName = track.name;
        playingAudio.addEventListener('ended', () => { stopPreview(); renderMusicMenu(); }, { once: true });
        try { await playingAudio.play(); } catch (error) { console.warn('Lecture audio impossible', error); stopPreview(); }
        renderMusicMenu();
      }));
    }

    async function loadMusicManifest() {
      const tracksByName = new Map();
      const addTrack = track => tracksByName.set(track.name, track);

      try {
        const response = await fetch('musiques/playlist.json');
        if (response.ok) {
          const files = await response.json();
          files.filter(file => supportedMusicPattern.test(file)).forEach(file => addTrack(musicTrack(file)));
        }
      } catch (error) {
        console.info('Playlist de secours non chargée.', error);
      }

      try {
        const directoryUrl = new URL('musiques/', window.location.href);
        const response = await fetch(directoryUrl);
        if (response.ok) {
          const directoryDocument = new DOMParser().parseFromString(await response.text(), 'text/html');
          directoryDocument.querySelectorAll('a[href]').forEach(link => {
            const href = link.getAttribute('href').split(/[?#]/)[0];
            let fileName;
            try { fileName = decodeURIComponent(href); } catch (error) { return; }
            if (!fileName.includes('/') && supportedMusicPattern.test(fileName)) {
              addTrack(musicTrack(fileName, new URL(href, directoryUrl).href));
            }
          });
        }
      } catch (error) {
        console.info('Index du dossier musiques non disponible.', error);
      }

      musicTracks = [...tracksByName.values()].sort((a, b) => a.label.localeCompare(b.label, 'fr'));
    }

    musicFolderInput.addEventListener('change', () => {
      stopPreview();
      musicTracks = [...musicFolderInput.files]
        .filter(file => file.type.startsWith('audio/') || supportedMusicPattern.test(file.name))
        .map(file => musicTrack(file.webkitRelativePath || file.name, URL.createObjectURL(file)));
      renderMusicMenu();
      setPage('menu');
    });

    function renderAlarmList() {
      listPage.innerHTML = `
        <div class="page-title">RÉVEILS</div>
        <div class="page-count">${alarms.length} réveil${alarms.length > 1 ? 's' : ''}</div>
        <div class="page-line"></div>
        <button class="nav-button left" type="button" data-action="home">← RETOUR</button>
        <button class="nav-button right" type="button" data-action="add">+ AJOUTER</button>
      `;

      alarms.forEach((alarm, index) => {
        const row = document.createElement('article');
        row.className = 'alarm-row';
        row.style.top = `${46 + index * 72}px`;
        row.innerHTML = `
          <button class="row-time" type="button" aria-label="Modifier l’heure du réveil" data-action="edit" data-index="${index}">${formatTime(alarm)}</button>
          <div class="row-days">${formatDays(alarm)}</div>
          <button class="toggle ${alarm.enabled ? 'on' : ''}" type="button" aria-label="Activer ou désactiver" data-action="toggle" data-index="${index}"></button>
          <button class="delete-button" type="button" aria-label="Supprimer" data-action="delete" data-index="${index}">⌫</button>
        `;
        listPage.append(row);
      });

      listPage.querySelector('[data-action="home"]').addEventListener('click', () => setPage('home'));
      listPage.querySelector('[data-action="add"]').addEventListener('click', () => openEditor());
      listPage.querySelectorAll('[data-action="edit"]').forEach(button => button.addEventListener('click', () => openEditor(Number(button.dataset.index))));
      listPage.querySelectorAll('[data-action="toggle"]').forEach(button => button.addEventListener('click', () => {
        alarms[button.dataset.index].enabled = !alarms[button.dataset.index].enabled;
        renderAlarmList();
        updateClockDisplay();
      }));
      listPage.querySelectorAll('[data-action="delete"]').forEach(button => button.addEventListener('click', () => {
        alarms.splice(button.dataset.index, 1);
        renderAlarmList();
        updateClockDisplay();
      }));
    }

    function openEditor(index = null) {
      editingAlarmIndex = index;
      draftAlarm = index === null
        ? { hour: 7, minute: 0, enabled: true, days: [false, true, true, true, true, true, false] }
        : { ...alarms[index], days: [...alarms[index].days] };
      renderEditor();
      setPage('edit');
    }

    function renderEditor() {
      editPage.innerHTML = `
        <div class="page-title">${editingAlarmIndex === null ? 'NOUVEAU RÉVEIL' : 'MODIFIER RÉVEIL'}</div>
        <div class="page-line"></div>
        <div class="picker">
          <div class="time-column">
            <button class="small-button up" data-action="hour-up" type="button">▲</button>
            <div class="time-value">${twoDigits(draftAlarm.hour)}</div>
            <button class="small-button down" data-action="hour-down" type="button">▼</button>
          </div>
          <div class="colon">:</div>
          <div class="time-column">
            <button class="small-button up" data-action="minute-up" type="button">▲</button>
            <div class="time-value">${twoDigits(draftAlarm.minute)}</div>
            <button class="small-button down" data-action="minute-down" type="button">▼</button>
          </div>
        </div>
        <div class="days-picker">
          ${shortDays.map((day, index) => `<button class="day-button ${draftAlarm.days[index] ? 'checked' : ''}" data-day="${index}" type="button">${day}</button>`).join('')}
        </div>
        <div class="page-footer-line"></div>
        <button class="nav-button cancel" data-action="cancel" type="button">← ANNULER</button>
        <button class="nav-button save" data-action="save" type="button">${editingAlarmIndex === null ? '✓ ENREGISTRER' : '✓ MODIFIER'}</button>
      `;

      editPage.querySelector('[data-action="hour-up"]').addEventListener('click', () => adjustTime('hour', 1));
      editPage.querySelector('[data-action="hour-down"]').addEventListener('click', () => adjustTime('hour', -1));
      editPage.querySelector('[data-action="minute-up"]').addEventListener('click', () => adjustTime('minute', 1));
      editPage.querySelector('[data-action="minute-down"]').addEventListener('click', () => adjustTime('minute', -1));
      editPage.querySelector('[data-action="cancel"]').addEventListener('click', () => { editingAlarmIndex = null; renderAlarmList(); setPage('list'); });
      editPage.querySelector('[data-action="save"]').addEventListener('click', () => {
        if (editingAlarmIndex === null) {
          alarms.push(draftAlarm);
        } else {
          alarms[editingAlarmIndex] = draftAlarm;
        }
        editingAlarmIndex = null;
        renderAlarmList();
        updateClockDisplay();
        setPage('list');
      });
      editPage.querySelectorAll('[data-day]').forEach(button => button.addEventListener('click', () => {
        draftAlarm.days[button.dataset.day] = !draftAlarm.days[button.dataset.day];
        renderEditor();
      }));
    }

    function adjustTime(part, delta) {
      if (part === 'hour') draftAlarm.hour = (draftAlarm.hour + delta + 24) % 24;
      if (part === 'minute') draftAlarm.minute = (draftAlarm.minute + delta + 60) % 60;
      renderEditor();
    }

    alarmButton.addEventListener('click', () => { renderAlarmList(); setPage('list'); });
    document.getElementById('menuButton').addEventListener('click', () => { renderMusicMenu(); setPage('menu'); });
    loadMusicManifest().then(renderMusicMenu);
    updateClockDisplay();
    setInterval(updateClockDisplay, 1000);
  </script>
</body>
</html>
