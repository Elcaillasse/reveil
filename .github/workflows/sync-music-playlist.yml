name: Synchroniser la playlist des musiques

on:
  push:
    paths:
      - "musiques/**"
      - "!musiques/playlist.json"
      - "scripts/sync_music_playlist.py"
      - ".github/workflows/sync-music-playlist.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-music-playlist-${{ github.ref }}
  cancel-in-progress: false

jobs:
  synchronize:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Régénérer la playlist
        run: python3 scripts/sync_music_playlist.py

      - name: Enregistrer la playlist mise à jour
        run: |
          if git diff --quiet -- musiques/playlist.json; then
            echo "La playlist est déjà à jour."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add musiques/playlist.json
          git commit -m "Synchronise la playlist des musiques"
          git push
